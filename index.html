<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
  <style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2235;
    --card2: #242840;
    --border: #2d3250;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --present: #43e97b;
    --absent: #ff6584;
    --tag-bg: #252a40;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG subtle grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .nav-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-pills {
    display: flex;
    gap: 6px;
  }

  .nav-pill {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-pill:hover, .nav-pill.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* LAYOUT */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .stat-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .stat-icon.purple { background: rgba(108,99,255,0.15); }
  .stat-icon.green  { background: rgba(67,233,123,0.15); }
  .stat-icon.red    { background: rgba(255,101,132,0.15); }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    margin-top: 2px;
  }
  .stat-value.purple { color: var(--accent); }
  .stat-value.green  { color: var(--present); }
  .stat-value.red    { color: var(--absent); }

  /* TWO COLUMN LAYOUT */
  .grid-2 {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* PANEL */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .panel-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-body {
    padding: 1.5rem;
  }

  /* ADD STUDENT FORM */
  .form-group {
    margin-bottom: 1.1rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 7px;
  }

  input[type="text"], input[type="email"], select {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.7; }

  select option { background: var(--card2); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
    width: 100%;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108,99,255,0.4);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-present {
    background: rgba(67,233,123,0.12);
    color: var(--present);
    border: 1.5px solid rgba(67,233,123,0.25);
    padding: 6px 12px;
    font-size: 0.8rem;
    border-radius: 8px;
  }
  .btn-present:hover, .btn-present.active {
    background: var(--present);
    color: #0f1117;
    border-color: var(--present);
  }

  .btn-absent {
    background: rgba(255,101,132,0.12);
    color: var(--absent);
    border: 1.5px solid rgba(255,101,132,0.25);
    padding: 6px 12px;
    font-size: 0.8rem;
    border-radius: 8px;
  }
  .btn-absent:hover, .btn-absent.active {
    background: var(--absent);
    color: #fff;
    border-color: var(--absent);
  }

  .btn-delete {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 8px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-delete:hover { background: rgba(255,101,132,0.12); color: var(--absent); }

  /* STUDENT LIST */
  .student-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .student-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 1.5rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.18s;
    animation: slideIn 0.3s ease both;
  }
  .student-item:last-child { border-bottom: none; }
  .student-item:hover { background: rgba(108,99,255,0.04); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .student-info { flex: 1; min-width: 0; }
  .student-name {
    font-weight: 500;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .student-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .attendance-controls {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .status-badge {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-right: 4px;
  }
  .badge-present { background: rgba(67,233,123,0.15); color: var(--present); }
  .badge-absent  { background: rgba(255,101,132,0.15); color: var(--absent); }
  .badge-none    { background: var(--tag-bg); color: var(--muted); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { font-size: 0.9rem; }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    padding-left: 36px;
  }
  .search-wrap .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 0.88rem;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* SECTION TITLE */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 600;
    background: rgba(108,99,255,0.1);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .count-badge {
    background: var(--tag-bg);
    color: var(--muted);
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 0.75rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card { padding: 0.9rem 0.8rem; gap: 10px; }
    .stat-value { font-size: 1.3rem; }
    .nav-pills { display: none; }
    main { padding: 1.5rem 1rem 3rem; }
  }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr; }
  }

  /* Divider text */
  .divider-text {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    position: relative;
    margin: 1rem 0;
  }
  .divider-text::before, .divider-text::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }
  .divider-text::before { left: 0; }
  .divider-text::after { right: 0; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">🎓</div>
    <span class="nav-title">Teacher Assistant</span>
  </div>
  <div class="nav-pills">
    <button class="nav-pill active">Dashboard</button>
    <button class="nav-pill">Reports</button>
    <button class="nav-pill">Settings</button>
  </div>
</nav>

<main>
  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon purple">👥</div>
      <div>
        <div class="stat-label">Total Students</div>
        <div class="stat-value purple" id="totalCount">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div>
        <div class="stat-label">Present</div>
        <div class="stat-value green" id="presentCount">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">❌</div>
      <div>
        <div class="stat-label">Absent</div>
        <div class="stat-value red" id="absentCount">0</div>
      </div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid-2">

    <!-- ADD STUDENT PANEL -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>➕</span> Add Student
          </div>
          <span class="section-label">New Entry</span>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="studentName" placeholder="e.g. Arjun Sharma" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="rollNo" placeholder="e.g. 2024001" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label>Subject / Class</label>
            <select id="subject">
              <option value="">Select subject…</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
              <option>Computer Science</option>
              <option>English</option>
              <option>History</option>
            </select>
          </div>

          <div class="divider-text">info</div>

          <button class="btn btn-primary" onclick="addStudent()">
            <span>✦</span> Add Student
          </button>
        </div>
      </div>

      <!-- QUICK ACTIONS -->
      <div class="panel" style="margin-top:14px;">
        <div class="panel-header">
          <div class="panel-title">⚡ Quick Actions</div>
        </div>
        <div class="panel-body" style="display:flex; flex-direction:column; gap:10px;">
          <button class="btn" style="background:rgba(67,233,123,0.12);color:var(--present);border:1.5px solid rgba(67,233,123,0.2);width:100%;" onclick="markAll('present')">
            ✅ Mark All Present
          </button>
          <button class="btn" style="background:rgba(255,101,132,0.12);color:var(--absent);border:1.5px solid rgba(255,101,132,0.2);width:100%;" onclick="markAll('absent')">
            ❌ Mark All Absent
          </button>
          <button class="btn" style="background:var(--card2);color:var(--muted);border:1.5px solid var(--border);width:100%;" onclick="resetAll()">
            🔄 Reset Attendance
          </button>
        </div>
      </div>
    </div>

    <!-- STUDENT LIST PANEL -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span>📋</span> Student List
          <span class="count-badge" id="listCount">0</span>
        </div>
      </div>

      <div style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display:flex; gap:10px; flex-direction:column;">
        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search students…" oninput="renderList()"/>
        </div>
        <!-- Filter -->
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
          <button class="filter-btn" data-filter="present" onclick="setFilter(this,'present')">Present</button>
          <button class="filter-btn" data-filter="absent" onclick="setFilter(this,'absent')">Absent</button>
          <button class="filter-btn" data-filter="unmarked" onclick="setFilter(this,'unmarked')">Unmarked</button>
        </div>
      </div>

      <div class="student-list" id="studentList">
        <div class="empty-state">
          <div class="empty-icon">🎒</div>
          <p>No students yet. Add your first student!</p>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- TOAST -->
<div id="toast"></div>

<script>
  let students = JSON.parse(localStorage.getItem('ta_students') || '[]');
  let currentFilter = 'all';

  const AVATAR_COLORS = [
    ['#6c63ff','#1e2235'],['#ff6584','#1e2235'],['#43e97b','#0f1117'],
    ['#f7971e','#1e2235'],['#a78bfa','#1e2235'],['#38f9d7','#0f1117'],
  ];

  function save() {
    localStorage.setItem('ta_students', JSON.stringify(students));
  }

  function getInitials(name) {
    return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  }

  function avatarColor(id) {
    return AVATAR_COLORS[id % AVATAR_COLORS.length];
  }

  function addStudent() {
    const name    = document.getElementById('studentName').value.trim();
    const roll    = document.getElementById('rollNo').value.trim();
    const subject = document.getElementById('subject').value;

    if (!name) { showToast('⚠️ Please enter a student name.'); return; }
    if (!roll)  { showToast('⚠️ Please enter a roll number.'); return; }

    // Check duplicate roll
    if (students.some(s => s.roll === roll)) {
      showToast('⚠️ Roll number already exists!'); return;
    }

    students.push({
      id: Date.now(),
      name,
      roll,
      subject: subject || 'General',
      status: null // null = unmarked
    });

    save();
    renderList();
    updateStats();
    showToast(`✅ ${name} added successfully!`);

    document.getElementById('studentName').value = '';
    document.getElementById('rollNo').value = '';
    document.getElementById('subject').value = '';
  }

  function markAttendance(id, status) {
    const s = students.find(s => s.id === id);
    if (!s) return;
    s.status = s.status === status ? null : status; // toggle
    save();
    renderList();
    updateStats();
  }

  function markAll(status) {
    if (!students.length) { showToast('⚠️ No students to mark.'); return; }
    students.forEach(s => s.status = status);
    save(); renderList(); updateStats();
    showToast(status === 'present' ? '✅ All marked Present!' : '❌ All marked Absent!');
  }

  function resetAll() {
    if (!students.length) return;
    students.forEach(s => s.status = null);
    save(); renderList(); updateStats();
    showToast('🔄 Attendance reset!');
  }

  function deleteStudent(id) {
    const s = students.find(s => s.id === id);
    students = students.filter(s => s.id !== id);
    save(); renderList(); updateStats();
    if (s) showToast(`🗑️ ${s.name} removed.`);
  }

  function setFilter(el, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentFilter = filter;
    renderList();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = students.filter(s => {
      const matchSearch = s.name.toLowerCase().includes(query) || s.roll.toLowerCase().includes(query);
      const matchFilter =
        currentFilter === 'all' ? true :
        currentFilter === 'present' ? s.status === 'present' :
        currentFilter === 'absent'  ? s.status === 'absent' :
        s.status === null;
      return matchSearch && matchFilter;
    });

    const container = document.getElementById('studentList');
    document.getElementById('listCount').textContent = list.length;

    if (!students.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎒</div><p>No students yet. Add your first student!</p></div>`;
      return;
    }

    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No students match your search or filter.</p></div>`;
      return;
    }

    container.innerHTML = list.map(s => {
      const [bg, fg] = avatarColor(s.id);
      const badgeHtml = s.status === 'present'
        ? `<span class="status-badge badge-present">Present</span>`
        : s.status === 'absent'
        ? `<span class="status-badge badge-absent">Absent</span>`
        : `<span class="status-badge badge-none">–</span>`;

      return `
      <div class="student-item" data-id="${s.id}">
        <div class="avatar" style="background:${bg};color:${fg};">${getInitials(s.name)}</div>
        <div class="student-info">
          <div class="student-name">${s.name}</div>
          <div class="student-meta">Roll ${s.roll} · ${s.subject}</div>
        </div>
        ${badgeHtml}
        <div class="attendance-controls">
          <button class="btn-present btn ${s.status==='present'?'active':''}" onclick="markAttendance(${s.id},'present')" title="Present">✓</button>
          <button class="btn-absent btn ${s.status==='absent'?'active':''}" onclick="markAttendance(${s.id},'absent')" title="Absent">✗</button>
          <button class="btn-delete" onclick="deleteStudent(${s.id})" title="Remove">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('totalCount').textContent   = students.length;
    document.getElementById('presentCount').textContent = students.filter(s=>s.status==='present').length;
    document.getElementById('absentCount').textContent  = students.filter(s=>s.status==='absent').length;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Enter key on name field
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('studentName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('rollNo').focus(); });
    document.getElementById('rollNo').addEventListener('keydown', e => { if(e.key==='Enter') addStudent(); });
    renderList();
    updateStats();
  });
</script>
</body>
</html>
